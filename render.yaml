services:
  - type: worker
    name: trading-bot-b3
    env: python
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: trading-bot-db
          property: connectionString

databases:
  - name: trading-bot-db
    plan: free
