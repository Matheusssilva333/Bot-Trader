services:
  - type: web
    name: trading-bot-pro
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
    autoDeploy: true

